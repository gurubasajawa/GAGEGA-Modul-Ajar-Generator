
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuruMendalam AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.cdnfonts.com/css/argentum-sans" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Outfit:wght@300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600;1,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; }
        .font-gagega { font-family: 'Argentum Sans', sans-serif; font-weight: 700; }
        .font-serif { font-family: 'Cormorant Garamond', serif; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0) rotate(0deg); }
            25% { transform: translateX(-1px) rotate(-0.5deg); }
            75% { transform: translateX(1px) rotate(0.5deg); }
        }
        .animate-shake {
            animation: shake 2s ease-in-out infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .animate-blink {
            animation: blink 1s ease-in-out infinite;
        }
        @keyframes rainbow-flow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .animate-rainbow {
            background-size: 200% auto;
            animation: rainbow-flow 3s linear infinite;
        }
        .animate-gagega {
            background-size: 200% auto;
            animation: shake 2s ease-in-out infinite, blink 1s ease-in-out infinite, rainbow-flow 3s linear infinite;
        }

        @media print {
            .no-print { display: none; }
            .print-only { display: block; }
            body { background: white; }
            .shadow-lg { shadow: none; }
        }
    </style>
